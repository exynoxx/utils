<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>p2p</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#c9d1d9;font-family:'Segoe UI',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* -- topbar -- */
#topbar{height:42px;background:#161b22;border-bottom:1px solid #21262d;display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700}
.badge-self{background:#1f3a5f;color:#79c0ff}
.badge-crypto{background:#1a3a22;color:#3fb950}
#status-dot{width:8px;height:8px;border-radius:50%;background:#3fb950;flex-shrink:0;transition:background .3s}
#status-dot.off{background:#484f58}

/* -- layout -- */
#main{flex:1;display:flex;min-height:0}
#graph-wrap{flex:1;position:relative;overflow:hidden}
#graph{position:absolute;inset:0;width:100%;height:100%;display:block}

/* -- sidebar -- */
#sidebar{width:330px;flex-shrink:0;border-left:1px solid #21262d;display:flex;flex-direction:column;background:#0d1117;overflow:hidden}

/* horizontal resize handle (between graph and sidebar) */
#sidebar-resizer{width:5px;flex-shrink:0;cursor:col-resize;background:transparent;transition:background .12s}
#sidebar-resizer:hover,#sidebar-resizer.drag{background:#30363d}

/* vertical resize handle (between stacked sidebar sections) */
.v-resizer{height:5px;flex-shrink:0;cursor:row-resize;background:transparent;transition:background .12s}
.v-resizer:hover,.v-resizer.drag{background:#30363d}

/* self panel */
#self-panel{padding:8px 12px 7px;border-bottom:1px solid #21262d;flex-shrink:0}
#sp-nick{font-size:14px;font-weight:700;color:#c9d1d9}
#sp-sub{font-size:11px;color:#8b949e;margin-top:1px}

/* chat log */
#chat-log{flex:1 1 0;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:3px;min-height:60px}
#chat-log::-webkit-scrollbar{width:3px}
#chat-log::-webkit-scrollbar-thumb{background:#30363d;border-radius:2px}
.msg{font-size:12px;line-height:1.5;word-break:break-word}
.msg .ts{color:#6e7681;font-size:10px;margin-right:3px}
.msg .nick{font-weight:700;margin-right:3px}
.msg.mine .nick{color:#58a6ff}
.msg.theirs .nick{color:#3fb950}
.msg.sys{color:#6e7681;font-style:italic;font-size:11px}

/* section titles */
.sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#6e7681;margin-bottom:5px}

.btn{border:none;border-radius:5px;padding:4px 12px;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s;line-height:1.5}
.btn-ghost{background:#21262d;color:#c9d1d9}
.btn-ghost:hover{background:#30363d}
.btn-primary{background:#1f6feb;color:#fff}
.btn-primary:hover{background:#388bfd}

/* -- per-peer area -- */
#peers-area{flex:0 0 auto;height:240px;overflow-y:auto;border-top:1px solid #21262d;padding:8px 12px}
#peers-area::-webkit-scrollbar{width:3px}
#peers-area::-webkit-scrollbar-thumb{background:#30363d;border-radius:2px}
#peers-area .area-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.peer-sec{margin-bottom:10px}
.peer-sec-hdr{display:flex;justify-content:space-between;align-items:center;gap:6px;margin-bottom:4px}
.peer-sec-hdr .nick{font-size:12px;font-weight:700;color:#79c0ff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.peer-sec-hdr .btn{padding:2px 8px;font-size:11px;flex-shrink:0}
.peer-xfers{display:flex;flex-direction:column;gap:4px;margin-bottom:4px}
.peer-files{display:flex;flex-direction:column}

/* received file rows */
.file-row{display:flex;align-items:center;gap:6px;padding:3px 6px;border-radius:4px;cursor:pointer;font-size:12px;transition:background .1s}
.file-row:hover{background:#161b22}
.fi{font-size:13px;flex-shrink:0}
.fn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#c9d1d9}
.fsz{color:#6e7681;font-size:10px;flex-shrink:0}
.files-empty{color:#6e7681;font-size:11px;padding:4px 6px}

/* -- shared folders panel -- */
#folders-panel{border-top:1px solid #21262d;padding:8px 12px 6px;flex-shrink:0;flex-direction:column;height:180px;overflow-y:auto;display:none}
#folders-panel::-webkit-scrollbar{width:3px}
#folders-panel::-webkit-scrollbar-thumb{background:#30363d;border-radius:2px}
.folder-block{margin-bottom:6px}
.folder-hdr{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.folder-icon{font-size:11px;color:#58a6ff}
.folder-name{font-size:11px;font-weight:700;color:#79c0ff}
.folder-files{overflow-y:auto;max-height:80px}
.folder-files::-webkit-scrollbar{width:3px}
.folder-files::-webkit-scrollbar-thumb{background:#30363d;border-radius:2px}

/* -- notifs -- */
#notifs{padding:0 12px 3px;display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.notif{font-size:11px;padding:3px 8px;border-radius:4px;background:#161b22;border:1px solid #21262d;color:#8b949e;animation:fadein .2s}
.notif.ok{border-color:#238636;color:#3fb950}
.notif.err{border-color:#da3633;color:#f85149}
@keyframes fadein{from{opacity:0;transform:translateY(3px)}to{opacity:1}}

/* -- chat input -- */
#chat-row{padding:8px 12px;border-top:1px solid #21262d;display:flex;gap:6px;flex-shrink:0}
#chat-text{flex:1;background:#161b22;border:1px solid #30363d;color:#c9d1d9;border-radius:5px;padding:5px 9px;font-size:12px;outline:none}
#chat-text:focus{border-color:#388bfd}

/* -- SVG graph -- */
.conn-line{stroke:#21262d;stroke-width:1.5;stroke-dasharray:5 4}
.p-circle{fill:#161b22;stroke:#30363d;stroke-width:2;cursor:pointer;transition:stroke .15s,fill .15s}
.p-group.enc .p-circle{stroke:#388bfd}
.p-nick{fill:#c9d1d9;text-anchor:middle;dominant-baseline:middle;font-size:13px;font-weight:600;pointer-events:none}
.p-addr{fill:#8b949e;text-anchor:middle;dominant-baseline:middle;font-size:9px;pointer-events:none}
.p-lock{text-anchor:middle;dominant-baseline:middle;font-size:10px;pointer-events:none}
.p-drop{fill:#3fb950;text-anchor:middle;dominant-baseline:middle;font-size:10px;font-weight:700;pointer-events:none;display:none}
.p-group.drag-on .p-circle{fill:#0d2a1a;stroke:#3fb950;stroke-width:3}
.p-group.drag-on .p-drop{display:block}
.p-group.phone .p-circle{stroke:#a371f7}
.p-group.phone.drag-on .p-circle{fill:#241a36;stroke:#bc8cff;stroke-width:3}
.p-glyph{text-anchor:middle;dominant-baseline:middle;font-size:20px;pointer-events:none}
.s-group.drag-on .s-circle{fill:#1a3050;stroke:#58a6ff;stroke-width:3}
.s-group.drag-on .s-drop{display:block}
.s-circle{fill:#1c2e4a;stroke:#388bfd;stroke-width:2;cursor:pointer}
.s-drop{fill:#58a6ff;text-anchor:middle;dominant-baseline:middle;font-size:10px;font-weight:700;pointer-events:none;display:none}
.s-nick{fill:#c9d1d9;text-anchor:middle;dominant-baseline:middle;font-size:14px;font-weight:700;pointer-events:none}
.s-addr{fill:#8b949e;text-anchor:middle;dominant-baseline:middle;font-size:9px;pointer-events:none}
@keyframes pulse{0%{r:56;opacity:.25}70%{r:72;opacity:0}100%{r:72;opacity:0}}
.s-pulse{animation:pulse 2.6s ease-out infinite;fill:none;stroke:#388bfd;stroke-width:1.5}
.p-ring{fill:none;stroke:#3fb950;stroke-width:3;pointer-events:none;transition:stroke-dashoffset .15s linear}
#empty-hint{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:16%;pointer-events:none;gap:6px;color:#21262d;font-size:14px}
#empty-hint.hidden{display:none}

/* -- click menu (peers + self) -- */
#peer-menu{position:absolute;background:#161b22;border:1px solid #30363d;border-radius:6px;padding:4px;display:none;z-index:10;box-shadow:0 4px 12px rgba(0,0,0,.4)}
#peer-menu.visible{display:flex;flex-direction:column;gap:2px}
#peer-menu button{background:transparent;border:none;color:#c9d1d9;padding:6px 14px;text-align:left;font-size:12px;cursor:pointer;border-radius:4px;font-family:inherit}
#peer-menu button:hover{background:#21262d}
#peer-menu .pm-title{font-size:10px;color:#6e7681;padding:3px 14px 1px;text-transform:uppercase;letter-spacing:.5px}

/* -- transfer rows (now rendered inside peer sections) -- */
.xfer{font-size:11px;color:#c9d1d9}
.xfer-row1{display:flex;gap:5px;align-items:center}
.xfer-dir{color:#58a6ff;font-weight:700}
.xfer-dir.recv{color:#3fb950}
.xfer-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.xfer-stats{color:#8b949e;font-size:10px;flex-shrink:0}
.xfer-bar{height:3px;background:#21262d;border-radius:2px;overflow:hidden;margin-top:2px}
.xfer-bar-fill{height:100%;background:#1f6feb;transition:width .15s linear}
.xfer.recv .xfer-bar-fill{background:#3fb950}
</style>
</head>
<body>

<div id="topbar">
  <span id="status-dot" class="off"></span>
  <span id="top-nick" class="badge badge-self">-</span>
  <span id="top-addr" style="font-size:12px;color:#8b949e"></span>
  <span id="top-crypto" class="badge badge-crypto" style="display:none">[enc] encrypted</span>
  <span style="flex:1"></span>
  <span id="peer-count" style="font-size:12px;color:#6e7681">0 peers</span>
</div>

<div id="main">

  <div id="graph-wrap">
    <svg id="graph" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="empty-hint">
      <span>No peers connected</span>
      <span style="font-size:12px;color:#30363d">Peers on your network appear here automatically</span>
    </div>
  </div>

  <div id="sidebar-resizer"></div>

  <div id="sidebar">

    <div id="self-panel">
      <div id="sp-nick">-</div>
      <div id="sp-sub">-</div>
    </div>

    <div id="chat-log"></div>

    <div class="v-resizer" id="peers-resizer"></div>

    <!-- per-peer received files + live transfers -->
    <div id="peers-area">
      <div class="area-title"><span class="sec-title" style="margin:0">Peers</span></div>
      <div id="peers-body"><div class="files-empty">No active transfers yet</div></div>
    </div>

    <div class="v-resizer" id="folders-resizer" style="display:none"></div>

    <!-- shared folders -->
    <div id="folders-panel">
      <div style="margin-bottom:5px"><span class="sec-title">Shared Folders</span></div>
      <div id="folders-body"></div>
    </div>

    <div id="notifs"></div>

    <div id="chat-row">
      <input id="chat-text" type="text" placeholder="Broadcast message..." autocomplete="off">
      <button class="btn btn-primary" id="chat-send">Send</button>
    </div>

  </div>
</div>

<!-- hidden inputs triggered by the click menu (peers + self) -->
<input type="file" id="peer-file-input" style="display:none" multiple>
<input type="file" id="peer-folder-input" style="display:none" webkitdirectory multiple>

<div id="peer-menu" role="menu">
  <div class="pm-title" id="pm-target">peer</div>
  <button type="button" id="pm-file">Send file...</button>
  <button type="button" id="pm-folder">Send folder...</button>
</div>

<script>
'use strict';

// special sentinel addr used by the self-node menu to mean "broadcast to all".
const ALL = '*ALL*';

// -- state --------------------------------------------------------------------
let self_ = {nick:'', addr:'', crypto:false};
const peers = new Map();   // addr -> PeerInfo
const phonesMap = new Map(); // id -> {id, name}  (browsers on the /phone page)
const folders = new Map(); // name -> {name, files[]}
// Per-peer sidebar UI state. addr -> {receivedFiles:[{name,size}]}
const peerUI = new Map();
function peerState(addr){
  let s = peerUI.get(addr);
  if(!s){ s = {receivedFiles:[]}; peerUI.set(addr, s); }
  return s;
}

// -- SVG helpers --------------------------------------------------------------
const NS = 'http://www.w3.org/2000/svg';
function svgEl(tag, attrs={}) {
  const el = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k,v);
  return el;
}

// -- render graph -------------------------------------------------------------
function render() {
  const svg = document.getElementById('graph');
  const W = svg.clientWidth||600, H = svg.clientHeight||600;
  const cx=W/2, cy=H/2;
  const peerList = [...peers.values()];
  const phoneList = [...phonesMap.values()];
  // Combined node list drives the ring layout so peers and phones never overlap.
  const nodeList = [...peerList, ...phoneList];
  const R = Math.min(W,H)*0.32;
  svg.innerHTML = '';

  document.getElementById('empty-hint').classList.toggle('hidden', nodeList.length>0);
  document.getElementById('peer-count').textContent =
    peerList.length===1 ? '1 peer' : `${peerList.length} peers`;

  // lines + ring positions (shared by peers and phones)
  nodeList.forEach((p,i)=>{
    const a = (2*Math.PI*i/nodeList.length) - Math.PI/2;
    p._x = cx + R*Math.cos(a);
    p._y = cy + R*Math.sin(a);
    svg.appendChild(svgEl('line',{class:'conn-line',x1:cx,y1:cy,x2:p._x,y2:p._y}));
  });

  // peer nodes
  const RING_R = 44;
  const RING_C = 2 * Math.PI * RING_R;
  for (const peer of peerList) {
    const g = document.createElementNS(NS,'g');
    g.setAttribute('class','p-group'+(peer.crypto?' enc':''));
    g.setAttribute('data-addr',peer.addr);
    const ttl=svgEl('title'); ttl.textContent=peer.addr; g.appendChild(ttl);
    g.appendChild(svgEl('circle',{class:'p-circle',cx:peer._x,cy:peer._y,r:40}));
    // progress ring (hidden by default; updated by updateRing).
    const ring = svgEl('circle',{
      class:'p-ring',cx:peer._x,cy:peer._y,r:RING_R,
      transform:`rotate(-90 ${peer._x} ${peer._y})`,
      'stroke-dasharray':RING_C,
      'stroke-dashoffset':RING_C,
    });
    g.appendChild(ring);
    const nt = svgEl('text',{class:'p-nick',x:peer._x,y:peer._y-10});
    nt.textContent = peerLabel(peer);
    g.appendChild(nt);
    const at = svgEl('text',{class:'p-addr',x:peer._x,y:peer._y+10});
    at.textContent = shortName(peer.addr);
    g.appendChild(at);
    if (peer.crypto) {
      const lk=svgEl('text',{class:'p-lock',x:peer._x+26,y:peer._y-26});
      lk.textContent='[enc]'; g.appendChild(lk);
    }
    const dl=svgEl('text',{class:'p-drop',x:peer._x,y:peer._y+22});
    dl.textContent='drop to send'; g.appendChild(dl);

    // drag onto peer node
    let dc=0;
    g.addEventListener('dragenter',e=>{e.preventDefault();if(++dc===1)g.classList.add('drag-on');});
    g.addEventListener('dragleave',()=>{if(--dc===0)g.classList.remove('drag-on');});
    g.addEventListener('dragover',e=>e.preventDefault());
    g.addEventListener('drop',e=>{
      e.preventDefault();dc=0;g.classList.remove('drag-on');
      const fs=e.dataTransfer.files;
      if(fs && fs.length) for(const f of fs) sendFile(peer.addr,f);
    });
    // click to open send menu
    g.addEventListener('click',e=>{
      e.stopPropagation();
      openPeerMenu(peer.addr, peer.nick||peer.addr, e.clientX, e.clientY);
    });
    svg.appendChild(g);
  }
  // phone nodes (browsers on /phone) — same drop/click send interface as peers,
  // but no folder send (phones receive plain files only).
  for (const ph of phoneList) {
    const g = document.createElementNS(NS,'g');
    g.setAttribute('class','p-group phone');
    g.setAttribute('data-phone', ph.id);
    const ttl=svgEl('title'); ttl.textContent='phone: '+ph.name; g.appendChild(ttl);
    g.appendChild(svgEl('circle',{class:'p-circle',cx:ph._x,cy:ph._y,r:40}));
    const gl=svgEl('text',{class:'p-glyph',x:ph._x,y:ph._y-12}); gl.textContent='📱'; g.appendChild(gl);
    const nt=svgEl('text',{class:'p-nick',x:ph._x,y:ph._y+8}); nt.textContent=ph.name; g.appendChild(nt);
    const at=svgEl('text',{class:'p-addr',x:ph._x,y:ph._y+21}); at.textContent='phone'; g.appendChild(at);
    const dl=svgEl('text',{class:'p-drop',x:ph._x,y:ph._y+34}); dl.textContent='drop to send'; g.appendChild(dl);

    // drag onto phone node
    let dc=0;
    g.addEventListener('dragenter',e=>{e.preventDefault();if(++dc===1)g.classList.add('drag-on');});
    g.addEventListener('dragleave',()=>{if(--dc===0)g.classList.remove('drag-on');});
    g.addEventListener('dragover',e=>e.preventDefault());
    g.addEventListener('drop',e=>{
      e.preventDefault();dc=0;g.classList.remove('drag-on');
      const fs=e.dataTransfer.files;
      if(fs && fs.length) for(const f of fs) pushToPhone(ph.id,f);
    });
    // click to open send menu (file only)
    g.addEventListener('click',e=>{
      e.stopPropagation();
      openPeerMenu(ph.id, ph.name, e.clientX, e.clientY, 'phone');
    });
    svg.appendChild(g);
  }

  // restore any in-flight progress rings after re-render.
  refreshAllRings();

  // self node
  const sg=document.createElementNS(NS,'g');
  sg.setAttribute('class','s-group');
  sg.appendChild(svgEl('circle',{class:'s-pulse',cx,cy,r:56}));
  sg.appendChild(svgEl('circle',{class:'s-circle',cx,cy,r:52}));
  const sn=svgEl('text',{class:'s-nick',x:cx,y:cy-8});
  sn.textContent=self_.nick||'you'; sg.appendChild(sn);
  const sa=svgEl('text',{class:'s-addr',x:cx,y:cy+10});
  sa.textContent=shortName(self_.addr); sg.appendChild(sa);
  if (self_.crypto) {
    const lk=svgEl('text',{class:'p-lock',x:cx+35,y:cy-35,'font-size':'13'});
    lk.textContent='[enc]'; sg.appendChild(lk);
  }
  // broadcast-drop label
  const sdl=svgEl('text',{class:'s-drop',x:cx,y:cy+26});
  sdl.textContent='send to all'; sg.appendChild(sdl);
  // drag-drop onto self = broadcast
  let sdc=0;
  sg.addEventListener('dragenter',e=>{e.preventDefault();if(++sdc===1)sg.classList.add('drag-on');});
  sg.addEventListener('dragleave',()=>{if(--sdc===0)sg.classList.remove('drag-on');});
  sg.addEventListener('dragover',e=>e.preventDefault());
  sg.addEventListener('drop',e=>{
    e.preventDefault();sdc=0;sg.classList.remove('drag-on');
    const files=e.dataTransfer.files;
    if(!files.length) return;
    if(!peers.size){addNotif('No peers connected',true);return;}
    for(const f of files) for(const addr of peers.keys()) sendFile(addr,f);
  });
  // click self = open broadcast menu
  sg.addEventListener('click',e=>{
    e.stopPropagation();
    if(!peers.size){addNotif('No peers connected',true);return;}
    openPeerMenu(ALL, 'all peers', e.clientX, e.clientY);
  });
  svg.appendChild(sg);
}

// -- top bar & self panel -----------------------------------------------------
function updateTopBar() {
  const me = shortName(self_.addr);
  document.getElementById('top-nick').textContent = self_.nick||'-';
  document.getElementById('top-addr').textContent = me;
  document.getElementById('top-crypto').style.display = self_.crypto ? '' : 'none';
  document.getElementById('sp-nick').textContent = self_.nick||'-';
  document.getElementById('sp-sub').textContent = me;
  document.getElementById('status-dot').classList.remove('off');
}

// -- chat ---------------------------------------------------------------------
function addChat(nick,text,t,mine=false) {
  const log=document.getElementById('chat-log');
  const d=document.createElement('div');
  d.className='msg '+(mine?'mine':'theirs');
  d.innerHTML=`<span class="ts">${t}</span><span class="nick">${esc(nick)}</span>${esc(text)}`;
  log.appendChild(d);
  log.scrollTop=log.scrollHeight;
}
function addSys(text) {
  const log=document.getElementById('chat-log');
  const d=document.createElement('div');
  d.className='msg sys'; d.textContent=text;
  log.appendChild(d);
  log.scrollTop=log.scrollHeight;
}
function addNotif(text,isErr=false) {
  const w=document.getElementById('notifs');
  const d=document.createElement('div');
  d.className='notif '+(isErr?'err':'ok');
  d.textContent=text; w.appendChild(d);
  setTimeout(()=>d.remove(),4000);
}
document.getElementById('chat-send').addEventListener('click',sendChat);
document.getElementById('chat-text').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}
});
function sendChat() {
  const inp=document.getElementById('chat-text');
  const text=inp.value.trim(); if(!text) return; inp.value='';
  fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})})
    .catch(e=>addNotif(String(e),true));
  addChat(self_.nick||'you',text,now(),true);
}

// -- file/folder send ---------------------------------------------------------
function sendFile(peerAddr,file) {
  if(!peerAddr){addNotif('Select a peer first',true);return;}
  addNotif(`Sending ${file.name}...`);
  const fd=new FormData(); fd.append('file',file);
  fetch('/file?peer='+encodeURIComponent(peerAddr),{method:'POST',body:fd})
    .then(r=>r.ok?addNotif('Sent: '+file.name):r.text().then(t=>addNotif(t,true)))
    .catch(e=>addNotif(String(e),true));
}

// push a single file to a connected phone (HTTP staging + targeted SSE notify).
function pushToPhone(phoneId, file) {
  if(!phoneId){addNotif('Select a phone first',true);return;}
  addNotif(`Sending ${file.name} to phone...`);
  const fd=new FormData(); fd.append('file',file);
  fetch('/push?phone='+encodeURIComponent(phoneId),{method:'POST',body:fd})
    .then(r=>r.ok?addNotif('Sent to phone: '+file.name):r.text().then(t=>addNotif(t,true)))
    .catch(e=>addNotif(String(e),true));
}

// send a whole folder to a single peer.
function sendFolder(peerAddr, files) {
  if(!peerAddr){addNotif('Select a peer first',true);return;}
  if(!files||!files.length){addNotif('Empty folder',true);return;}
  // Derive top-level folder name from any file's webkitRelativePath.
  const firstRel = files[0].webkitRelativePath || files[0].name;
  const folderName = firstRel.split('/')[0] || 'folder';
  addNotif(`Sending folder ${folderName} (${files.length} files)...`);
  const fd = new FormData();
  for(const f of files){
    const rel = f.webkitRelativePath || f.name;
    fd.append(rel, f, f.name);
  }
  const url = '/folder?peer=' + encodeURIComponent(peerAddr) + '&name=' + encodeURIComponent(folderName);
  fetch(url,{method:'POST',body:fd})
    .then(r=>r.ok?addNotif('Folder queued: '+folderName):r.text().then(t=>addNotif(t,true)))
    .catch(e=>addNotif(String(e),true));
}

// -- click menu (peers + self broadcast) --------------------------------------
let _menuPeerAddr = '';
let _menuKind = 'peer'; // 'peer' | 'phone' | 'all'
function openPeerMenu(addr, label, x, y, kind='peer'){
  _menuPeerAddr = addr;
  _menuKind = kind;
  const m = document.getElementById('peer-menu');
  document.getElementById('pm-target').textContent = 'Send to ' + label;
  // Phones receive plain files only — no folder send.
  document.getElementById('pm-folder').style.display = kind==='phone' ? 'none' : '';
  m.classList.add('visible');
  // Position; clamp to viewport.
  const vw = window.innerWidth, vh = window.innerHeight;
  const w = m.offsetWidth || 160, h = m.offsetHeight || 70;
  m.style.left = Math.min(x, vw - w - 8) + 'px';
  m.style.top  = Math.min(y, vh - h - 8) + 'px';
}
function closePeerMenu(){
  document.getElementById('peer-menu').classList.remove('visible');
  _menuPeerAddr = '';
  _menuKind = 'peer';
}
document.addEventListener('click', closePeerMenu);
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closePeerMenu(); });
document.getElementById('peer-menu').addEventListener('click', e=>e.stopPropagation());
document.getElementById('pm-file').addEventListener('click', ()=>{
  const inp=document.getElementById('peer-file-input');
  inp.dataset.peer=_menuPeerAddr;
  inp.dataset.kind=_menuKind;
  closePeerMenu();
  inp.click();
});
document.getElementById('pm-folder').addEventListener('click', ()=>{
  const inp=document.getElementById('peer-folder-input');
  inp.dataset.peer=_menuPeerAddr;
  closePeerMenu();
  inp.click();
});
document.getElementById('peer-file-input').addEventListener('change', e=>{
  const addr=e.target.dataset.peer;
  if(e.target.dataset.kind==='phone'){
    for(const f of e.target.files) pushToPhone(addr,f);
  } else {
    const targets = addr===ALL ? [...peers.keys()] : [addr];
    for(const a of targets) for(const f of e.target.files) sendFile(a,f);
  }
  e.target.value='';
});
document.getElementById('peer-folder-input').addEventListener('change', e=>{
  const addr=e.target.dataset.peer;
  const targets = addr===ALL ? [...peers.keys()] : [addr];
  for(const a of targets) sendFolder(a, e.target.files);
  e.target.value='';
});

// -- per-peer sidebar sections ------------------------------------------------
// Rebuilds #peers-body from `peers`, `peerUI` and `transfers`. Idempotent and
// decoupled from the SVG render() (which wipes only the <svg>). Re-binds each
// active transfer's `t.row` to the freshly created DOM node.
function peerHasActivity(addr){
  if(peerState(addr).receivedFiles.length) return true;
  for(const t of transfers.values()) if(t.peer===addr) return true;
  return false;
}
function renderPeerSections(){
  const body=document.getElementById('peers-body');
  const shown=[...peers.values()].filter(p=>peerHasActivity(p.addr));
  if(!shown.length){
    body.innerHTML='<div class="files-empty">No active transfers yet</div>';
    return;
  }
  body.innerHTML='';
  for(const p of shown){
    const addr=p.addr;
    const sec=document.createElement('div');
    sec.className='peer-sec';
    sec.dataset.addr=addr;

    const hdr=document.createElement('div');
    hdr.className='peer-sec-hdr';
    const nk=document.createElement('span');
    nk.className='nick'; nk.textContent=peerLabel(p); nk.title=addr;
    const open=document.createElement('button');
    open.className='btn btn-ghost'; open.type='button'; open.textContent='Open folder';
    open.addEventListener('click',()=>fetch('/files/opendir').catch(()=>{}));
    hdr.appendChild(nk); hdr.appendChild(open);
    sec.appendChild(hdr);

    // active transfers for this peer
    const xf=document.createElement('div');
    xf.className='peer-xfers';
    for(const [key,t] of transfers){
      if(t.peer!==addr) continue;
      const row=createTransferRow(t,key);
      t.row=row;
      updateTransferRow(t);
      xf.appendChild(row);
    }
    sec.appendChild(xf);

    // received files for this peer
    const fl=document.createElement('div');
    fl.className='peer-files';
    const rf=peerState(addr).receivedFiles;
    for(const f of rf){
      const row=document.createElement('div');
      row.className='file-row'; row.title='Open '+f.name;
      row.innerHTML=`<span class="fi">${fileIcon(f.name)}</span><span class="fn">${esc(f.name)}</span><span class="fsz">${fmtBytes(f.size)}</span>`;
      row.addEventListener('click',()=>fetch('/files/open?name='+encodeURIComponent(f.name)).catch(()=>{}));
      fl.appendChild(row);
    }
    sec.appendChild(fl);

    body.appendChild(sec);
  }
}

// -- SSE ----------------------------------------------------------------------
function connect() {
  const es=new EventSource('/events');
  es.addEventListener('init',e=>{
    const data=JSON.parse(e.data);
    self_=data.self; peers.clear();
    (data.peers||[]).forEach(p=>peers.set(p.addr,p));
    phonesMap.clear();
    (data.phones||[]).forEach(p=>phonesMap.set(p.id,p));
    folders.clear();
    (data.folders||[]).forEach(f=>{folders.set(f.name,f);});
    updateTopBar(); requestAnimationFrame(render);
    renderPeerSections();
    renderFolders();
  });
  es.addEventListener('peer_join',e=>{
    const p=JSON.parse(e.data);
    peers.set(p.addr,p); render(); renderPeerSections();
    addSys(`+ ${peerLabel(p)}${p.crypto?' [enc]':''} connected`);
  });
  es.addEventListener('peer_leave',e=>{
    const {addr}=JSON.parse(e.data);
    const p=peers.get(addr); peers.delete(addr); peerUI.delete(addr);
    render(); renderPeerSections();
    addSys(`- ${p?peerLabel(p):shortName(addr)} disconnected`);
  });
  es.addEventListener('phone_join',e=>{
    const p=JSON.parse(e.data);
    phonesMap.set(p.id,p); render();
    addSys(`+ ${p.name} (phone) connected`);
  });
  es.addEventListener('phone_leave',e=>{
    const {id}=JSON.parse(e.data);
    const p=phonesMap.get(id); phonesMap.delete(id); render();
    addSys(`- ${p?p.name:'phone'} disconnected`);
  });
  es.addEventListener('chat',e=>{
    const {nick,text,time}=JSON.parse(e.data);
    addChat(nick,text,time);
  });
  es.addEventListener('file_done',e=>{
    const {path}=JSON.parse(e.data);
    const name=path.replace(/\\/g,'/').split('/').pop();
    addNotif('Received: '+name);
    addSys('File received -> '+name);
  });
  es.addEventListener('folder_change',e=>{
    const {folder,rel_path}=JSON.parse(e.data);
    addSys(`[${folder}] updated: ${rel_path}`);
  });
  es.addEventListener('folder_delete',e=>{
    const {folder,rel_path}=JSON.parse(e.data);
    addSys(`[${folder}] deleted: ${rel_path}`);
  });
  es.addEventListener('folder_files',e=>{
    const {folder,files}=JSON.parse(e.data);
    const sf=folders.get(folder)||{name:folder,files:[]};
    sf.files=files||[];
    folders.set(folder,sf);
    renderFolders();
  });
  es.addEventListener('transfer_progress',e=>{
    const d=JSON.parse(e.data);
    updateTransferProgress(d.name, d.pct||0, !!d.recv, d.peer||'', d.bytes||0, d.total||0);
  });
  es.onerror=()=>document.getElementById('status-dot').classList.add('off');
  es.onopen =()=>document.getElementById('status-dot').classList.remove('off');
}

// -- phone presence polling ---------------------------------------------------
// The SSE phone_join/phone_leave events update the graph instantly, but polling
// /phones is the authoritative source of truth so presence self-heals if an
// event is ever missed. Only re-render when the set of phones actually changes.
function applyPhones(list){
  const next = new Map((list||[]).map(p=>[p.id, p]));
  let changed = next.size !== phonesMap.size;
  if(!changed){
    for(const [id,p] of next){
      const cur = phonesMap.get(id);
      if(!cur || cur.name !== p.name){ changed = true; break; }
    }
  }
  if(!changed) return;
  // Preserve layout coords on surviving nodes to avoid a visual jump.
  for(const [id,p] of next){ const cur = phonesMap.get(id); if(cur){ p._x=cur._x; p._y=cur._y; } }
  phonesMap.clear();
  for(const [id,p] of next) phonesMap.set(id,p);
  render();
}
async function pollPhones(){
  try{ applyPhones(await (await fetch('/phones')).json()); }catch(_){}
}
function startPhonePolling(){ pollPhones(); setInterval(pollPhones, 3000); }

// -- transfer progress: speed, ETA, ring, per-peer rows -----------------------
const transfers = new Map(); // key -> {name, recv, peer, pct, bytes, total, lastBytes, lastTs, bps, recorded, row}

function transferKey(name, recv, peer){ return (recv?'r|':'s|') + peer + '|' + name; }

function fmtBps(n){
  if(!isFinite(n)||n<=0) return '- /s';
  if(n<1024) return n.toFixed(0)+' B/s';
  if(n<1048576) return (n/1024).toFixed(1)+' KB/s';
  if(n<1073741824) return (n/1048576).toFixed(1)+' MB/s';
  return (n/1073741824).toFixed(2)+' GB/s';
}
function fmtEta(sec){
  if(!isFinite(sec)||sec<=0) return '-';
  sec=Math.round(sec);
  if(sec<60) return sec+'s';
  if(sec<3600) return Math.floor(sec/60)+'m '+(sec%60)+'s';
  return Math.floor(sec/3600)+'h '+Math.floor((sec%3600)/60)+'m';
}

function updateTransferProgress(name, pct, recv, peer, bytes, total){
  const key = transferKey(name, recv, peer);
  const nowt = performance.now();
  let t = transfers.get(key);
  const isNew = !t;
  if(isNew){
    t = {name, recv, peer, pct:0, bytes:0, total, lastBytes:0, lastTs:nowt, bps:0, recorded:false, row:null};
    transfers.set(key, t);
  }
  // speed: exponential smoothing.
  const dt = (nowt - t.lastTs) / 1000;
  if(dt > 0.05){
    const inst = (bytes - t.lastBytes) / dt;
    t.bps = t.bps === 0 ? inst : (0.7*t.bps + 0.3*inst);
    t.lastBytes = bytes;
    t.lastTs = nowt;
  }
  const justDone = pct >= 100 && t.pct < 100;
  t.pct = pct; t.bytes = bytes; t.total = total || t.total;

  // Record a completed receive into the peer's file list (synchronously, before
  // the row is removed) so the section never momentarily empties.
  if(recv && pct >= 100 && !t.recorded){
    t.recorded = true;
    const rf = peerState(peer).receivedFiles;
    if(!rf.some(f=>f.name===t.name)) rf.unshift({name:t.name, size:t.total||t.bytes});
  }

  if(isNew || justDone){
    // Structural change: (re)build the owning peer's section, then update row.
    renderPeerSections();
  } else if(t.row){
    // Pure progress tick: cheap targeted update (keeps bar animation smooth).
    updateTransferRow(t);
  } else {
    renderPeerSections();
  }
  updateRing(peer);

  if(pct >= 100){
    // brief grace so the user sees 100%, then remove the in-transit row.
    setTimeout(()=>{
      const cur = transfers.get(key);
      if(cur){ transfers.delete(key); }
      updateRing(peer);
      renderPeerSections();
    }, 800);
  }
}

// Build a fresh transfer row element (not attached). Caller sets t.row + appends.
function createTransferRow(t, key){
  const row = document.createElement('div');
  row.className = 'xfer' + (t.recv?' recv':'');
  row.dataset.key = key;
  row.innerHTML =
    '<div class="xfer-row1">'
    + '<span class="xfer-dir'+(t.recv?' recv':'')+'">'+(t.recv?'↓':'↑')+'</span>'
    + '<span class="xfer-name"></span>'
    + '<span class="xfer-stats"></span>'
    + '</div>'
    + '<div class="xfer-bar"><div class="xfer-bar-fill"></div></div>';
  return row;
}
function updateTransferRow(t){
  if(!t.row) return;
  const remaining = (t.total > 0 && t.bps > 0) ? (t.total - t.bytes) / t.bps : NaN;
  t.row.querySelector('.xfer-name').textContent = t.name;
  t.row.querySelector('.xfer-stats').textContent =
    t.pct.toFixed(1)+'%  '+fmtBps(t.bps)+'  ETA '+fmtEta(remaining);
  t.row.querySelector('.xfer-bar-fill').style.width = Math.min(100, t.pct).toFixed(1)+'%';
}

// Pick the highest-pct active transfer for the given peer and drive its ring.
function updateRing(peer){
  if(!peer) return;
  let maxPct = 0, anyActive = false;
  for(const t of transfers.values()){
    if(t.peer === peer && t.pct < 100){
      anyActive = true;
      if(t.pct > maxPct) maxPct = t.pct;
    }
  }
  const g = document.querySelector(`g.p-group[data-addr="${cssEscape(peer)}"]`);
  if(!g) return;
  const ring = g.querySelector('.p-ring');
  if(!ring) return;
  const c = parseFloat(ring.getAttribute('stroke-dasharray')) || 0;
  if(!anyActive){
    ring.setAttribute('stroke-dashoffset', c);
    return;
  }
  ring.setAttribute('stroke-dashoffset', (c * (1 - maxPct/100)).toFixed(2));
}
function refreshAllRings(){
  const seen = new Set();
  for(const t of transfers.values()){
    if(t.peer && !seen.has(t.peer)){ updateRing(t.peer); seen.add(t.peer); }
  }
}
function cssEscape(s){
  return (window.CSS && CSS.escape) ? CSS.escape(s) : s.replace(/(["\\\]\[])/g,'\\$1');
}

// -- shared folders -----------------------------------------------------------
function renderFolders() {
  const panel=document.getElementById('folders-panel');
  const resizer=document.getElementById('folders-resizer');
  const body=document.getElementById('folders-body');
  if(!folders.size){
    panel.style.display='none';
    resizer.style.display='none';
    return;
  }
  panel.style.display='flex';
  resizer.style.display='';
  body.innerHTML='';
  for(const [name,sf] of folders){
    const block=document.createElement('div');
    block.className='folder-block';
    const hdr=document.createElement('div');
    hdr.className='folder-hdr';
    hdr.innerHTML=`<span class="folder-icon">[sync]</span><span class="folder-name">${esc(name)}</span><span class="fsz" style="margin-left:auto">${(sf.files||[]).length} file${(sf.files||[]).length===1?'':'s'}</span>`;
    block.appendChild(hdr);
    const fl=document.createElement('div');
    fl.className='folder-files';
    if(!sf.files||!sf.files.length){
      fl.innerHTML='<div class="files-empty">Empty</div>';
    } else {
      for(const f of sf.files){
        const row=document.createElement('div');
        row.className='file-row';
        row.innerHTML=`<span class="fi">${fileIcon(f.name)}</span><span class="fn">${esc(f.name)}</span><span class="fsz">${fmtBytes(f.size)}</span>`;
        fl.appendChild(row);
      }
    }
    block.appendChild(fl);
    body.appendChild(block);
  }
}

// -- resizing (sidebar width + section heights; not persisted) ----------------
function clamp(v,lo,hi){ return Math.max(lo, Math.min(hi, v)); }

(function initHResize(){
  const handle=document.getElementById('sidebar-resizer');
  const sidebar=document.getElementById('sidebar');
  let startX=0, startW=0, dragging=false;
  handle.addEventListener('mousedown',e=>{
    e.preventDefault();
    dragging=true; startX=e.clientX; startW=sidebar.offsetWidth;
    handle.classList.add('drag'); document.body.style.userSelect='none';
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging) return;
    const w=clamp(startW + (startX - e.clientX), 220, window.innerWidth-220);
    sidebar.style.width=w+'px';
    clearTimeout(rt); rt=setTimeout(render,16);
  });
  document.addEventListener('mouseup',()=>{
    if(!dragging) return;
    dragging=false; handle.classList.remove('drag'); document.body.style.userSelect='';
    render();
  });
})();

// Each handle resizes the section directly below it; #chat-log (flex:1) absorbs
// the remainder. min 80px for the resized section, and keep chat-log usable.
function makeVResize(handleId, sectionId){
  const handle=document.getElementById(handleId);
  const section=document.getElementById(sectionId);
  const chat=document.getElementById('chat-log');
  let startY=0, startH=0, dragging=false;
  handle.addEventListener('mousedown',e=>{
    e.preventDefault();
    dragging=true; startY=e.clientY; startH=section.offsetHeight;
    handle.classList.add('drag'); document.body.style.userSelect='none';
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging) return;
    const delta=e.clientY-startY;
    // dragging down shrinks the section below (gives space to chat-log above).
    let h=startH - delta;
    const maxH = section.offsetHeight + chat.offsetHeight - 60; // keep chat >= 60
    h=clamp(h, 80, Math.max(80, maxH));
    section.style.height=h+'px';
  });
  document.addEventListener('mouseup',()=>{
    if(!dragging) return;
    dragging=false; handle.classList.remove('drag'); document.body.style.userSelect='';
  });
}
makeVResize('peers-resizer','peers-area');
makeVResize('folders-resizer','folders-panel');

// -- short memorable peer names ----------------------------------------------
// Peers auto-discover, so the raw peer ID is noise. We derive a stable, short
// "adjective-animal" label from the ID (deterministic: same peer → same name
// everywhere, every session). The full ID stays available as a hover tooltip.
const NAME_ADJ=['swift','brave','calm','bright','bold','keen','wise','warm','cool','neat',
  'quick','lucky','jolly','noble','merry','sly','spry','witty','sunny','glad',
  'fuzzy','zesty','crisp','vivid','plucky','snug','dapper','breezy','mellow','peppy'];
const NAME_ANI=['fox','owl','wolf','bear','hawk','lynx','otter','crow','seal','deer',
  'moth','newt','toad','wren','finch','crab','mole','vole','ibex','koala',
  'puma','swan','heron','raven','stoat','quail','gecko','panda','bison','egret'];
// Extract the /p2p/<id> tail from a multiaddr, or return the input unchanged
// (peer.addr is already a bare peer ID).
function peerIdOf(s){const m=/\/p2p\/([^/]+)/.exec(String(s||''));return m?m[1]:String(s||'');}
function shortName(addr){
  const id=peerIdOf(addr);
  if(!id) return 'peer';
  let h=2166136261>>>0;                      // FNV-1a over the peer ID
  for(let i=0;i<id.length;i++){h^=id.charCodeAt(i);h=Math.imul(h,16777619)>>>0;}
  const a=NAME_ADJ[h%NAME_ADJ.length];
  const b=NAME_ANI[Math.floor(h/NAME_ADJ.length)%NAME_ANI.length];
  return a+'-'+b;
}
// Display label for a peer: its chosen nick if any, else a memorable name.
function peerLabel(p){return (p&&p.nick)?p.nick:shortName(p?p.addr:'');}

// -- helpers ------------------------------------------------------------------
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function now(){const d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}
function fmtBytes(n){if(n<1024)return n+' B';if(n<1048576)return(n/1024).toFixed(1)+' KB';return(n/1048576).toFixed(1)+' MB';}
function fileIcon(name){
  const m={png:'[img]',jpg:'[img]',jpeg:'[img]',gif:'[img]',webp:'[img]',svg:'[img]',
    pdf:'[pdf]',txt:'[txt]',md:'[txt]',doc:'[doc]',docx:'[doc]',csv:'[csv]',xlsx:'[csv]',
    zip:'[zip]',gz:'[zip]',tar:'[zip]',rar:'[zip]','7z':'[zip]',
    mp4:'[vid]',mov:'[vid]',avi:'[vid]',mkv:'[vid]',mp3:'[aud]',wav:'[aud]',flac:'[aud]',
    exe:'[exe]',msi:'[exe]',dmg:'[exe]',sh:'[sh]',py:'[py]',js:'[js]',ts:'[ts]',go:'[go]'};
  return m[name.split('.').pop().toLowerCase()]||'[?]';
}

let rt;
window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(render,60);});
window.addEventListener('load',render);
connect();
startPhonePolling();

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>p2p — phone</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0d1117;color:#c9d1d9;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  min-height:100vh;padding:14px 14px calc(14px + env(safe-area-inset-bottom));max-width:680px;margin:0 auto;font-size:15px}

header{margin-bottom:18px}
h1{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
#dot{width:9px;height:9px;border-radius:50%;background:#3fb950;flex-shrink:0;transition:background .3s}
#dot.off{background:#da3633}
#sub{font-size:12px;color:#8b949e;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.card{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:16px;margin-bottom:16px}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#6e7681;margin-bottom:12px}

/* send / drop zone */
#drop{display:block;border:2px dashed #30363d;border-radius:10px;padding:24px 14px;text-align:center;color:#8b949e;
  transition:border-color .15s,background .15s;cursor:pointer}
#drop.over{border-color:#388bfd;background:#10243e;color:#c9d1d9}
#drop .big{font-size:28px;margin-bottom:6px}
#drop input{display:none}
.btn{display:block;width:100%;border:none;border-radius:9px;padding:13px;font-size:15px;font-weight:600;
  cursor:pointer;margin-top:12px;background:#1f6feb;color:#fff}
.btn:active{background:#388bfd}
.btn:disabled{background:#21262d;color:#6e7681}
.btn-ghost{background:#21262d;color:#c9d1d9;padding:9px;font-size:13px;width:auto;margin:0}

#picked{font-size:13px;color:#c9d1d9;margin-top:10px;display:none}
#picked b{color:#79c0ff}

/* upload progress */
#prog{display:none;margin-top:12px}
#bar-wrap{height:8px;background:#21262d;border-radius:4px;overflow:hidden}
#bar{height:100%;width:0;background:#1f6feb;transition:width .15s}
#prog-txt{font-size:12px;color:#8b949e;margin-top:6px}

/* files list */
.files-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.files-head .sec-title{margin:0}
ul{list-style:none}
li a{display:flex;align-items:center;gap:11px;padding:12px 10px;border-radius:9px;text-decoration:none;
  color:inherit;border:1px solid #21262d;margin-bottom:8px;background:#0d1117}
li a:active{background:#161b22}
.ic{font-size:22px;flex-shrink:0;width:26px;text-align:center}
.fmeta{min-width:0;flex:1}
.fname{font-size:14px;word-break:break-word;line-height:1.3}
.fsize{font-size:12px;color:#6e7681;margin-top:1px}
.dl{font-size:18px;color:#58a6ff;flex-shrink:0}
.empty{color:#6e7681;font-size:13px;text-align:center;padding:14px 0}

#toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(80px);
  background:#1a3a22;color:#3fb950;border:1px solid #2ea043;padding:10px 18px;border-radius:8px;
  font-size:13px;font-weight:600;opacity:0;transition:transform .25s,opacity .25s;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#toast.err{background:#3a1a1a;color:#f85149;border-color:#da3633}
</style>
</head>
<body>
<header>
  <h1><span id="dot"></span><span id="title">p2p</span></h1>
  <div id="sub">connecting…</div>
</header>

<div class="card">
  <div class="sec-title">Send to this PC</div>
  <label id="drop">
    <div class="big">⬆</div>
    <div>Tap to choose files<br>or drop them here</div>
    <input id="file" type="file" multiple>
  </label>
  <div id="picked"></div>
  <button id="send" class="btn" disabled>Send</button>
  <div id="prog">
    <div id="bar-wrap"><div id="bar"></div></div>
    <div id="prog-txt"></div>
  </div>
</div>

<div class="card">
  <div class="files-head">
    <div class="sec-title">Files on PC</div>
    <button id="refresh" class="btn btn-ghost">↻ Refresh</button>
  </div>
  <ul id="files"><li class="empty">loading…</li></ul>
</div>

<div id="toast"></div>

<script>
const $ = s => document.querySelector(s);
const fileInput = $('#file'), drop = $('#drop'), picked = $('#picked'),
      sendBtn = $('#send'), prog = $('#prog'), bar = $('#bar'), progTxt = $('#prog-txt'),
      filesEl = $('#files'), dot = $('#dot');
let chosen = [];

// --- stable phone identity (so the PC can show + target this device) ---
function guessName(){
  const u = navigator.userAgent || '';
  if(/iPhone/i.test(u)) return 'iPhone';
  if(/iPad/i.test(u)) return 'iPad';
  if(/Android/i.test(u)) return 'Android';
  if(/Macintosh/i.test(u)) return 'Mac';
  if(/Windows/i.test(u)) return 'Windows';
  return 'phone';
}
let phoneId = localStorage.getItem('p2p-phone-id');
if(!phoneId){ phoneId = 'ph_' + Math.random().toString(36).slice(2,10); localStorage.setItem('p2p-phone-id', phoneId); }
const phoneName = localStorage.getItem('p2p-phone-name') || guessName();

function fmtSize(n){
  if(n < 1024) return n + ' B';
  if(n < 1048576) return (n/1024).toFixed(1) + ' KB';
  if(n < 1073741824) return (n/1048576).toFixed(1) + ' MB';
  return (n/1073741824).toFixed(2) + ' GB';
}
function icon(name){
  const e = (name.split('.').pop()||'').toLowerCase();
  if(['png','jpg','jpeg','gif','webp','svg','bmp','heic'].includes(e)) return '🖼️';
  if(['mp4','mov','mkv','avi','webm','m4v'].includes(e)) return '🎬';
  if(['mp3','wav','flac','ogg','m4a','aac'].includes(e)) return '🎵';
  if(['pdf'].includes(e)) return '📕';
  if(['zip','tar','gz','rar','7z'].includes(e)) return '🗜️';
  if(['doc','docx','txt','md','rtf'].includes(e)) return '📄';
  return '📦';
}
function toast(msg, isErr){
  const t = $('#toast');
  t.textContent = msg;
  t.className = isErr ? 'show err' : 'show';
  setTimeout(() => { t.className = isErr ? 'err' : ''; }, 2600);
}

// --- pick files ---
fileInput.addEventListener('change', () => setChosen([...fileInput.files]));
['dragover','dragenter'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('over'); }));
['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('over'); }));
drop.addEventListener('drop', e => setChosen([...e.dataTransfer.files]));

function setChosen(list){
  chosen = list;
  if(chosen.length === 0){ picked.style.display='none'; sendBtn.disabled=true; return; }
  const total = chosen.reduce((a,f) => a + f.size, 0);
  picked.innerHTML = `<b>${chosen.length}</b> file${chosen.length>1?'s':''} · ${fmtSize(total)}`;
  picked.style.display = 'block';
  sendBtn.disabled = false;
}

// --- send ---
sendBtn.addEventListener('click', () => {
  if(chosen.length === 0) return;
  const fd = new FormData();
  chosen.forEach(f => fd.append('file', f, f.name));
  const xhr = new XMLHttpRequest();
  xhr.open('POST', '/upload');
  sendBtn.disabled = true;
  prog.style.display = 'block';
  bar.style.width = '0';
  progTxt.textContent = 'Sending…';
  xhr.upload.onprogress = e => {
    if(e.lengthComputable){
      const pct = e.loaded / e.total * 100;
      bar.style.width = pct + '%';
      progTxt.textContent = `${fmtSize(e.loaded)} / ${fmtSize(e.total)} (${pct.toFixed(0)}%)`;
    }
  };
  xhr.onload = () => {
    prog.style.display = 'none';
    if(xhr.status >= 200 && xhr.status < 300){
      toast(`Sent ${chosen.length} file${chosen.length>1?'s':''} ✓`);
      setChosen([]); fileInput.value = '';
      loadFiles();
    } else {
      toast('Send failed: ' + (xhr.responseText || xhr.status), true);
      sendBtn.disabled = false;
    }
  };
  xhr.onerror = () => { prog.style.display='none'; toast('Network error', true); sendBtn.disabled=false; };
  xhr.send(fd);
});

// --- files on PC ---
function renderFiles(files){
  if(!files || files.length === 0){
    filesEl.innerHTML = '<li class="empty">No files yet</li>';
    return;
  }
  filesEl.innerHTML = files.map(f => `
    <li><a href="/files/download?name=${encodeURIComponent(f.name)}">
      <span class="ic">${icon(f.name)}</span>
      <span class="fmeta"><div class="fname">${escapeHtml(f.name)}</div>
        <div class="fsize">${fmtSize(f.size)}</div></span>
      <span class="dl">⬇</span>
    </a></li>`).join('');
}
function escapeHtml(s){ return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function loadFiles(){
  try{
    const r = await fetch('/files');
    renderFiles(await r.json());
  }catch(e){ /* SSE / next refresh will recover */ }
}
$('#refresh').addEventListener('click', loadFiles);

async function loadState(){
  try{
    const r = await fetch('/state');
    const s = await r.json();
    $('#title').textContent = s.self?.nick ? `${s.self.nick}` : 'p2p';
  }catch(e){ /* SSE will reflect connection state */ }
}

// --- heartbeat: tell the PC we're here every few seconds (drives presence) ---
function ping(){
  fetch('/phone/ping',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id:phoneId,name:phoneName})}).catch(()=>{});
}
function startHeartbeat(){
  ping();
  setInterval(ping, 3000);
  // Resume pinging promptly when the tab comes back to the foreground.
  document.addEventListener('visibilitychange', () => { if(!document.hidden) ping(); });
  // Best-effort immediate goodbye so the PC drops us without waiting for expiry.
  const bye = () => { try{ navigator.sendBeacon('/phone/bye', JSON.stringify({id:phoneId})); }catch(_){} };
  window.addEventListener('pagehide', bye);
}

// --- auto-download a file the PC pushed to this phone ---
function autoDownload(url, name){
  const a = document.createElement('a');
  a.href = url; a.download = name || ''; a.rel = 'noopener';
  document.body.appendChild(a); a.click(); a.remove();
}

// --- live updates over the existing SSE stream ---
function connectSSE(){
  // Identify as a phone so the PC UI shows this device and can push files to it.
  const url = '/events?role=phone&id=' + encodeURIComponent(phoneId) + '&name=' + encodeURIComponent(phoneName);
  const es = new EventSource(url);
  es.onopen = () => { dot.classList.remove('off'); $('#sub').textContent = 'connected'; };
  es.onerror = () => { dot.classList.add('off'); $('#sub').textContent = 'reconnecting…'; };
  const onFiles = e => { try{ renderFiles(JSON.parse(e.data)); }catch(_){} };
  es.addEventListener('files_changed', onFiles);
  es.addEventListener('file_done', () => loadFiles());
  es.addEventListener('push', e => {
    try{
      const {name, url} = JSON.parse(e.data);
      toast('Incoming: ' + name);
      autoDownload(url, name);
    }catch(_){}
  });
}

loadState();
loadFiles();
connectSSE();
startHeartbeat();
</script>
</body>
</html>
